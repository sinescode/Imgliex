name: Download Blockchair Addresses

on:
  workflow_dispatch:        # manual trigger from Actions tab
  schedule:
    - cron: '0 2 * * 1'    # optional: every Monday at 02:00 UTC

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours max — 2 GB on GitHub runners ~100–200 MB/s

    steps:
      - name: Download blockchair_bitcoin_addresses_latest.tsv.gz
        run: |
          URL="https://gz.blockchair.com/bitcoin/addresses/blockchair_bitcoin_addresses_latest.tsv.gz"
          OUTPUT="blockchair_bitcoin_addresses_latest.tsv.gz"

          echo "Starting download..."
          curl -L \
            --retry 10 \
            --retry-delay 5 \
            --retry-max-time 3600 \
            --continue-at - \
            --progress-bar \
            --output "$OUTPUT" \
            "$URL"

          SIZE=$(du -sh "$OUTPUT" | cut -f1)
          echo "✅ Downloaded: $OUTPUT ($SIZE)"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockchair-bitcoin-addresses
          path: blockchair_bitcoin_addresses_latest.tsv.gz
          retention-days: 2          # keep for 5 days (max 90)
          compression-level: 0       # file is already gzipped — skip recompression
